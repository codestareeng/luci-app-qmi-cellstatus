name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  release:
      types: [published]

jobs:
  build:
    name: Build (${{ matrix.pkg_arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - sdk_arch: x86-64-25.12.2
            pkg_arch: x86_64
          - sdk_arch: sunxi-cortexa53-25.12.2
            pkg_arch: aarch64_cortex-a53
          - sdk_arch: sunxi-cortexa7-25.12.2
            pkg_arch: arm_cortex-a7_neon-vfpv4
          - sdk_arch: ath79-generic-25.12.2
            pkg_arch: mips_24kc
          - sdk_arch: ramips-mt7620-25.12.2
            pkg_arch: mipsel_24kc

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build package with OpenWrt SDK (25.12 / APK)
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: ${{ matrix.sdk_arch }}
          FEEDNAME: packages_ci
          PACKAGES: luci-app-qmi-cellstatus
          NO_SHFMT_CHECK: "1"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-qmi-cellstatus-${{ matrix.pkg_arch }}
          path: bin/packages/${{ matrix.pkg_arch }}/packages_ci/luci-app-qmi-cellstatus*.apk
          if-no-files-found: warn

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: luci-app-qmi-cellstatus-*
          merge-multiple: false

      - name: List release assets
        run: find release-assets -name '*.apk' | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*.apk
          body: |
            ## Installation (OpenWrt 24.10+ / 25.12.x — APK format)

            Download the `.apk` file for your router's architecture and install it via:

            ```sh
            opkg install luci-app-qmi-cellstatus_*.apk
            ```

            Or upload it through **System > Software > Upload Package** in LuCI.

            After installation, log out and back in to see the new **Status > Cellular Info** menu entry.

            ## Supported architectures
            | Artifact | Architecture |
            |---|---|
            | `luci-app-qmi-cellstatus-x86_64` | x86 64-bit |
            | `luci-app-qmi-cellstatus-aarch64_cortex-a53` | ARM 64-bit (Cortex-A53) |
            | `luci-app-qmi-cellstatus-arm_cortex-a7_neon-vfpv4` | ARM 32-bit (Cortex-A7) |
            | `luci-app-qmi-cellstatus-mips_24kc` | MIPS 32-bit big-endian 24Kc (Atheros/QCA) |
            | `luci-app-qmi-cellstatus-mipsel_24kc` | MIPS 32-bit little-endian 24Kc (MediaTek/Ralink) |
